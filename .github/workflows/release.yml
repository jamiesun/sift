name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege by default; jobs opt into exactly what they need.
permissions: {}

jobs:
  guard:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Reject non-SemVer tags
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Only vMAJOR.MINOR.PATCH(-prerelease)(+build) tags may publish.
          if ! printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "refusing to release from non-SemVer tag: ${REF_NAME}" >&2
            exit 1
          fi
          echo "release tag ${REF_NAME} accepted"

  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    needs: guard
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: macos-amd64
            os: macos-15-intel
          - asset: macos-arm64
            os: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Create archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME//\//-}"
          archive="sift-${version}-${{ matrix.asset }}.tar.xz"

          mkdir -p dist/sift
          cp target/release/sift dist/sift/
          cp README.md config.example.toml dist/sift/
          cp -R docs dist/sift/docs
          tar -C dist -cJf "${archive}" sift
          shasum -a 256 "${archive}" > "${archive}.sha256"

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sift-${{ matrix.asset }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    # Release creation is the only step that needs write access; gate it behind
    # an environment so a maintainer can approve before assets go public.
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist-artifacts

      - name: Create release with all assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find dist-artifacts -type f | sort)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: jamiesun/homebrew-tap
    steps:
      - name: Check out Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release artifacts
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist-artifacts

      - name: Render and push formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          base="https://github.com/jamiesun/sift/releases/download/${TAG}"

          sha() {
            local f
            f="$(find dist-artifacts -name "$1.sha256" -print -quit)"
            [ -n "$f" ] || { echo "missing checksum for $1" >&2; exit 1; }
            awk '{print $1; exit}' "$f"
          }

          ARM_SHA="$(sha "sift-${TAG}-macos-arm64.tar.xz")"
          AMD_SHA="$(sha "sift-${TAG}-macos-amd64.tar.xz")"

          # Tap repo is already checked out at ./tap with persisted credentials,
          # so the token never appears in a git remote URL or process arguments.
          mkdir -p tap/Formula

          cat > tap/Formula/sift.rb <<EOF
          class Sift < Formula
            desc "Cost-controlled open-source project auditor"
            homepage "https://github.com/jamiesun/sift"
            version "${VERSION}"
            license :cannot_represent

            on_macos do
              if Hardware::CPU.arm?
                url "${base}/sift-${TAG}-macos-arm64.tar.xz"
                sha256 "${ARM_SHA}"
              else
                url "${base}/sift-${TAG}-macos-amd64.tar.xz"
                sha256 "${AMD_SHA}"
              end
            end

            def install
              bin.install "sift"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sift --version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sift.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${VERSION}"
          else
            git commit -m "sift ${VERSION}"
            git push
          fi
